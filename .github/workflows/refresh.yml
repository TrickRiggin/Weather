name: Weather Refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  repository_dispatch:
    types: [light-refresh]
  workflow_dispatch:

concurrency:
  group: weather-refresh
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run weather pipeline
        env:
          OPENMETEO_API_KEY: ${{ secrets.OPENMETEO_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_RSA_KEY: ${{ secrets.KALSHI_RSA_KEY }}
        run: python refresh_weather.py --write-data

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/ data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Refresh: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase
          git push
